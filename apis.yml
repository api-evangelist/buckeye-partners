description: >-
  Buckeye Partners, LP is a master limited partnership that owns and operates one of the
  largest independent liquid petroleum product pipeline and terminal systems in the United
  States. Buckeye transports and stores refined petroleum products including gasoline, jet
  fuel, diesel, and heating oil, connecting refineries and import terminals to local
  distribution markets across the Eastern US, Midwest, and internationally. Buckeye was
  taken private by IFM Investors in 2019.
